<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Truegear Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    :root {
      --bg:#04060f; --bg2:#080d1a; --bg3:#0d1525; --border:#1a2540;
      --accent:#00e5ff; --accent2:#7c3aed; --green:#00ff88;
      --red:#ff3366; --yellow:#ffcc00; --text:#c8d8f0; --dim:#3a4a6a;
      --font-hd:'Orbitron',monospace; --font-mono:'Share Tech Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);overflow-x:hidden;}
    body::before{content:'';pointer-events:none;position:fixed;inset:0;z-index:9999;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);}

    .app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:14px;gap:10px;}

    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border);}
    .logo{font-family:var(--font-hd);font-size:17px;font-weight:900;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px var(--accent);}
    .logo span{color:var(--accent2);}

    /* Devices strip */
    .devices-strip{display:flex;gap:6px;flex-wrap:wrap;}
    .device-chip{
      display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
      background:var(--bg2);border:1px solid var(--border);font-size:11px;cursor:pointer;transition:all .2s;
    }
    .device-chip.active{border-color:var(--green);}
    .device-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--dim);}
    .device-chip.active .dot{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
    .device-chip.reconnecting .dot{background:var(--yellow);animation:blink .5s infinite;}
    .device-chip .x{color:var(--dim);margin-left:2px;font-size:13px;}
    .device-chip .x:hover{color:var(--red);}
    .add-device-btn{
      padding:5px 12px;border-radius:20px;background:transparent;
      border:1px dashed var(--border);color:var(--dim);font-size:11px;cursor:pointer;font-family:var(--font-mono);
      transition:all .2s;
    }
    .add-device-btn:hover{border-color:var(--accent);color:var(--accent);}
    .add-device-btn:disabled{opacity:.3;cursor:not-allowed;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

    /* Battery */
    .battery-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .batt-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px;text-align:center;}
    .batt-label{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:3px;text-transform:uppercase;}
    .batt-val{font-family:var(--font-hd);font-size:16px;font-weight:700;color:var(--accent);}
    .batt-val.low{color:var(--red);} .batt-val.mid{color:var(--yellow);}
    .batt-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:3px;overflow:hidden;}
    .batt-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s,background .3s;}
    .batt-fill.low{background:var(--red);} .batt-fill.mid{background:var(--yellow);}

    /* Status */
    .status-line{font-size:11px;color:var(--dim);text-align:center;min-height:16px;letter-spacing:1px;}
    .status-line.ok{color:var(--green);} .status-line.error{color:var(--red);} .status-line.load{color:var(--yellow);}

    /* Tabs */
    .tabs{display:flex;gap:3px;background:var(--bg2);border-radius:10px;padding:3px;border:1px solid var(--border);flex-wrap:wrap;}
    .tab{flex:1;padding:7px 4px;text-align:center;border-radius:7px;font-size:10px;letter-spacing:1px;
      cursor:pointer;color:var(--dim);transition:all .2s;text-transform:uppercase;min-width:52px;}
    .tab.active{background:var(--bg3);color:var(--accent);border:1px solid var(--border);}
    .panel{display:none;} .panel.active{display:block;}

    /* Button */
    .btn{flex:1;padding:11px;border:none;border-radius:8px;font-family:var(--font-mono);
      font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .btn:disabled{opacity:.3;cursor:not-allowed;}
    .btn:active:not(:disabled){transform:scale(.97);}
    .btn-primary{background:linear-gradient(135deg,var(--accent2),#4f46e5);color:white;}
    .btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);}
    .btn-sm{padding:6px 14px;font-size:11px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font-mono);letter-spacing:1px;}

    /* Body map */
    .side-toggle{display:flex;gap:6px;margin-bottom:8px;}
    .side-btn{flex:1;padding:6px;border-radius:6px;font-size:11px;letter-spacing:2px;cursor:pointer;
      border:1px solid var(--border);background:var(--bg2);color:var(--dim);text-transform:uppercase;transition:all .2s;}
    .side-btn.active{background:var(--bg3);border-color:var(--accent);color:var(--accent);}
    .body-svg-wrap{display:flex;justify-content:center;background:var(--bg2);border:1px solid var(--border);
      border-radius:12px;padding:12px;position:relative;user-select:none;}
    .body-svg{width:100%;max-width:440px;touch-action:none;}
    .torso-path{fill:none;stroke:var(--dim);stroke-width:1.5;opacity:.2;}
    .motor-zone{cursor:pointer;transition:all .15s;}
    .motor-zone rect{fill:var(--bg3);stroke:var(--dim);stroke-width:1;rx:6;transition:all .15s;}
    .motor-zone text{fill:var(--dim);font-size:10px;font-family:var(--font-mono);pointer-events:none;text-anchor:middle;dominant-baseline:middle;}
    .motor-zone.active rect{fill:var(--accent);stroke:var(--accent);filter:drop-shadow(0 0 10px var(--accent));}
    .motor-zone.active text{fill:var(--bg);}
    .motor-zone.flash rect{fill:var(--yellow);stroke:var(--yellow);filter:drop-shadow(0 0 12px var(--yellow));}
    .motor-zone.disabled rect{fill:var(--bg);stroke:var(--bg3);opacity:.25;}
    .body-hint{text-align:center;font-size:10px;color:var(--dim);margin-top:6px;letter-spacing:1px;}
    .intensity-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
    .intensity-label{font-size:10px;color:var(--dim);letter-spacing:1px;white-space:nowrap;}
    input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
      background:linear-gradient(to right,var(--accent) var(--val,70%),var(--bg3) var(--val,70%));outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
      background:var(--accent);box-shadow:0 0 8px var(--accent);cursor:pointer;}
    .intensity-val{font-family:var(--font-hd);font-size:13px;color:var(--accent);min-width:30px;text-align:right;}

    /* Presets */
    .preset-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
    .preset-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
      padding:12px 10px;cursor:pointer;text-align:left;color:var(--text);transition:all .2s;position:relative;overflow:hidden;}
    .preset-btn:disabled{opacity:.3;cursor:not-allowed;}
    .preset-btn.firing{border-color:var(--green)!important;background:rgba(0,255,136,.06)!important;}
    .preset-icon{font-size:20px;margin-bottom:3px;}
    .preset-name{font-size:13px;font-weight:bold;margin-bottom:2px;}
    .preset-desc{font-size:10px;color:var(--dim);}

    /* Files / Favorites */
    .upload-zone{border:1px dashed var(--border);border-radius:10px;padding:18px;text-align:center;
      cursor:pointer;transition:all .2s;position:relative;}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(0,229,255,.03);}
    .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
    .upload-icon{font-size:22px;margin-bottom:4px;}
    .upload-text{font-size:12px;color:var(--dim);letter-spacing:1px;}
    .effect-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
    .effect-row{display:flex;align-items:center;justify-content:space-between;
      background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;}
    .effect-row-info .name{font-size:12px;color:var(--text);}
    .effect-row-info .meta{font-size:10px;color:var(--dim);}
    .effect-row-btns{display:flex;gap:5px;}
    .btn-send{background:var(--accent2);color:white;}
    .btn-save{background:transparent;color:var(--yellow);border:1px solid var(--yellow);}
    .btn-del {background:transparent;color:var(--red);  border:1px solid rgba(255,51,102,.4);}
    .section-label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:10px 0 6px;}

    /* Editor */
    .editor-wrap{display:flex;flex-direction:column;gap:8px;}
    .editor-row{display:flex;gap:8px;align-items:center;}
    .editor-label{font-size:11px;color:var(--dim);min-width:56px;letter-spacing:1px;}
    .editor-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
      color:var(--text);font-family:var(--font-mono);font-size:12px;padding:7px 10px;outline:none;}
    .editor-input:focus{border-color:var(--accent);}
    select.editor-input option{background:var(--bg3);}
    .motor-picker{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:4px;}
    .mpick{width:26px;height:26px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);
      color:var(--dim);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .mpick.sel{background:var(--accent2);border-color:var(--accent2);color:white;}
    .tracks-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;}
    .track-row{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;
      display:flex;justify-content:space-between;align-items:center;font-size:11px;}
    .track-info{color:var(--text);}
    .track-meta{color:var(--dim);font-size:10px;margin-top:2px;}
    .btn-remove-track{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 4px;}
    .btn-remove-track:hover{color:var(--red);}
    .editor-actions{display:flex;gap:6px;margin-top:4px;}

    /* Remote control */
    .remote-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;display:none;}
    .remote-panel.show{display:block;}
    .remote-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .remote-title{font-size:12px;letter-spacing:2px;color:var(--text);text-transform:uppercase;}
    .remote-status{font-size:10px;padding:3px 10px;border-radius:10px;border:1px solid var(--border);color:var(--dim);letter-spacing:1px;}
    .remote-status.linked{border-color:var(--green);color:var(--green);}
    .remote-tabs{display:flex;gap:4px;margin-bottom:12px;}
    .rtab{flex:1;padding:7px;text-align:center;border-radius:6px;font-size:11px;letter-spacing:1px;
      border:1px solid var(--border);background:var(--bg3);color:var(--dim);cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .rtab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.07);}
    .rpanel{display:none;} .rpanel.active{display:block;}
    .room-code-display{
      text-align:center;padding:16px;background:var(--bg3);border-radius:10px;
      border:1px solid var(--border);margin-bottom:10px;
    }
    .code-label{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;}
    .code-value{font-family:var(--font-hd);font-size:32px;font-weight:900;letter-spacing:8px;color:var(--accent);text-shadow:0 0 16px var(--accent);}
    .code-hint{font-size:10px;color:var(--dim);margin-top:6px;letter-spacing:1px;}
    .remote-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-family:var(--font-hd);font-size:20px;padding:12px;outline:none;
      text-align:center;letter-spacing:6px;text-transform:uppercase;margin-bottom:8px;}
    .remote-input:focus{border-color:var(--accent);}
    .remote-peers{display:flex;flex-direction:column;gap:5px;margin-top:6px;}
    .peer-chip{display:flex;align-items:center;justify-content:space-between;
      background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
    .peer-name{font-size:12px;color:var(--text);}
    .peer-status{font-size:10px;color:var(--green);}
    .remote-info{font-size:11px;color:var(--dim);text-align:center;padding:8px;letter-spacing:1px;}

    /* Liquid shake module */
    .shake-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;display:none;}
    .shake-panel.show{display:block;}
    .shake-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .shake-title{font-size:12px;letter-spacing:2px;color:var(--text);text-transform:uppercase;}
    .shake-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;}
    .toggle-track{width:36px;height:20px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);position:relative;transition:background .2s;}
    .toggle-track.on{background:var(--accent2);border-color:var(--accent2);}
    .toggle-thumb{width:14px;height:14px;border-radius:50%;background:white;position:absolute;top:2px;left:2px;transition:left .2s;}
    .toggle-track.on .toggle-thumb{left:18px;}
    /* Liquid canvas */
    .liquid-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;background:var(--bg3);}
    #liquid-canvas{display:block;width:100%;height:100px;}
    .liquid-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
    .liquid-label{font-size:10px;color:rgba(200,216,240,.4);letter-spacing:2px;text-transform:uppercase;}
    .shake-settings{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .shake-setting{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
    .shake-setting label{font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:4px;text-transform:uppercase;}
    .shake-setting select{width:100%;background:transparent;border:none;color:var(--text);font-family:var(--font-mono);font-size:11px;outline:none;cursor:pointer;}
    .shake-setting select option{background:var(--bg3);}
    .shake-log{font-size:11px;color:var(--dim);text-align:center;min-height:16px;letter-spacing:1px;}
    .shake-log.triggered{color:var(--green);}
    .shake-log.error{color:var(--red);}

    /* Log */
    .log-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .log-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border);}
    .log-title{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
    .log-clear{font-size:10px;color:var(--dim);cursor:pointer;padding:2px 6px;border-radius:4px;}
    .log-clear:hover{color:var(--text);}
    .log-body{max-height:120px;overflow-y:auto;padding:6px 12px;}
    .log-line{font-size:11px;margin-bottom:2px;line-height:1.5;}
    .log-line.ok{color:var(--green);} .log-line.warn{color:var(--yellow);}
    .log-line.error{color:var(--red);} .log-line.info{color:var(--dim);}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--bg2);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">TRUE<span>GEAR</span></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="games.html" target="_blank" style="font-size:10px;color:var(--dim);letter-spacing:1px;text-decoration:none;border:1px solid var(--border);padding:4px 10px;border-radius:6px;transition:all .2s;" onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'" onmouseout="this.style.color='var(--dim)';this.style.borderColor='var(--border)'">🎮 游戏列表</a>
      <div style="font-size:10px;color:var(--dim);letter-spacing:1px" id="conn-summary">未连接</div>
    </div>
  </div>

  <!-- Devices -->
  <div class="devices-strip" id="devices-strip">
    <button class="add-device-btn" id="btn-add-device" onclick="addDevice()">＋ 连接设备</button>
  </div>

  <!-- Battery (shows for primary device) -->
  <div class="battery-row" id="battery-row" style="display:none">
    <div class="batt-card">
      <div class="batt-label">背心</div>
      <div class="batt-val" id="bv-vest">--%</div>
      <div class="batt-bar"><div class="batt-fill" id="bf-vest" style="width:0%"></div></div>
    </div>
    <div class="batt-card">
      <div class="batt-label">左手</div>
      <div class="batt-val" id="bv-left">--%</div>
      <div class="batt-bar"><div class="batt-fill" id="bf-left" style="width:0%"></div></div>
    </div>
    <div class="batt-card">
      <div class="batt-label">右手</div>
      <div class="batt-val" id="bv-right">--%</div>
      <div class="batt-bar"><div class="batt-fill" id="bf-right" style="width:0%"></div></div>
    </div>
  </div>

  <div class="status-line" id="status">添加设备开始使用</div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('bodymap')">触控体图</div>
    <div class="tab"        onclick="switchTab('presets')">特效预设</div>
    <div class="tab"        onclick="switchTab('files')">特效文件</div>
    <div class="tab"        onclick="switchTab('editor')">编辑器</div>
  </div>

  <!-- ═══ BODY MAP ═══ -->
  <div class="panel active" id="panel-bodymap">
    <div class="side-toggle">
      <div class="side-btn active" id="side-front" onclick="setSide('front')">前面</div>
      <div class="side-btn"        id="side-back"  onclick="setSide('back')">背面</div>
    </div>
    <div class="body-svg-wrap">
    <svg class="body-svg" viewBox="0 0 440 360" id="body-svg">
        <g id="motor-zones"></g>
      </svg>
    </div>
    <div class="body-hint">按住振动 · 滑动切换</div>
    <div class="intensity-row">
      <span class="intensity-label">强度</span>
      <input type="range" id="intensity-slider" min="10" max="100" value="70"
             oninput="updateIntensity(this.value)" style="--val:70%">
      <span class="intensity-val" id="intensity-val">70</span>
    </div>
  </div>

  <!-- ═══ PRESETS ═══ -->
  <div class="panel" id="panel-presets">
    <div class="preset-grid">
      <button class="preset-btn" id="pb-massage"    onclick="sendEffect('Massage')" disabled>
        <div class="preset-icon">💆</div><div class="preset-name">按摩</div><div class="preset-desc">波浪式全身放松</div>
      </button>
      <button class="preset-btn" id="pb-heartbeat"
        onmousedown="startHeartbeat()" onmouseup="stopHeartbeat()" onmouseleave="stopHeartbeat()"
        ontouchstart="startHeartbeat()" ontouchend="stopHeartbeat()" disabled>
        <div class="preset-icon">💓</div><div class="preset-name">心跳</div><div class="preset-desc">按住持续</div>
      </button>
      <button class="preset-btn" id="pb-explosion"  onclick="sendEffect('Explosion')" disabled>
        <div class="preset-icon">💣</div><div class="preset-name">爆炸</div><div class="preset-desc">全身强振</div>
      </button>
      <button class="preset-btn" id="pb-healing"    onclick="sendEffect('Healing')" disabled>
        <div class="preset-icon">💚</div><div class="preset-name">回血</div><div class="preset-desc">全身波浪扩散</div>
      </button>
    </div>
  </div>

  <!-- ═══ FILES ═══ -->
  <div class="panel" id="panel-files">
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept=".json,.asset_json" multiple onchange="loadFiles(this.files)">
      <div class="upload-icon">📂</div>
      <div class="upload-text">点击或拖拽特效文件</div>
    </div>
    <div class="section-label">已加载</div>
    <div class="effect-list" id="loaded-list"></div>
    <div class="section-label">⭐ 收藏夹</div>
    <div class="effect-list" id="fav-list"></div>
  </div>

  <!-- ═══ EDITOR ═══ -->
  <div class="panel" id="panel-editor">
    <div class="editor-wrap">
      <div class="editor-row">
        <span class="editor-label">特效名称</span>
        <input class="editor-input" id="ed-name" placeholder="MyEffect" value="MyEffect">
      </div>
      <div class="editor-row">
        <span class="editor-label">类型</span>
        <select class="editor-input" id="ed-type">
          <option value="Shake">振动 Shake</option>
          <option value="Electrical">电刺激 Electrical</option>
        </select>
      </div>
      <div class="editor-row">
        <span class="editor-label">强度模式</span>
        <select class="editor-input" id="ed-mode">

<script>
// ═══════════════════════════════════════════════════════
//  BINARY PROTOCOL
// ═══════════════════════════════════════════════════════
const UART_SVC='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_RX ='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const UART_TX ='6e400003-b5a3-f393-e0a9-e50e24dcca9e';
const FD1=[1,1,4,4,1,1,4,4,1,1,4,4,1,1,4,4,1,1,4,4];
const FD2=[0x8000,0x0400,0x8000,0x0400,0x4000,0x0200,0x4000,0x0200,
           0x2000,0x0100,0x2000,0x0100,0x1000,0x0080,0x1000,0x0080,0x0800,0x0040,0x0800,0x0040];
const BD1=[2,2,3,3,2,2,3,3,2,2,3,3,2,2,3,3,2,2,3,3];
const BD2=[0x8000,0x0400,0x8000,0x0400,0x4000,0x0200,0x4000,0x0200,
           0x2000,0x0100,0x2000,0x0100,0x1000,0x0080,0x1000,0x0080,0x0800,0x0040,0x0800,0x0040];
const ELEC=1.0;
const hi=v=>(v>>8)&0xFF, lo=v=>v&0xFF, i8=v=>v&0xFF;

function motorBitmasks(idx){
  let b1=0,b2=0,b3=0,b4=0;
  for(const i of idx){
    if(i<100){if(FD1[i]===1)b1|=FD2[i];if(FD1[i]===4)b4|=FD2[i];}
    else{const j=i-100;if(BD1[j]===2)b2|=BD2[j];if(BD1[j]===3)b3|=BD2[j];}
  }
  return[b1,b2,b3,b4];
}

function buildShakeBytes(t,keep,aid=0){
  const b=[],b2=[],im=t.intensity_mode;
  if(im==='Const')b.push(keep?3:1,aid);
  else if(im==='Fade')b.push(keep?4:2,aid);
  else{b.push(keep?4:2,aid);b2.push(keep?4:2,aid);}
  if(im==='FadeInAndOut'){
    const m=Math.floor((t.end_time+t.start_time)/2);
    b.push(hi(t.start_time),lo(t.start_time),hi(m),lo(m));
    b2.push(hi(m),lo(m),hi(t.end_time),lo(t.end_time));
  } else b.push(hi(t.start_time),lo(t.start_time),hi(t.end_time),lo(t.end_time));
  const si=i8(t.start_intensity),ei=i8(t.end_intensity);
  if(im==='Const')b.push(si,si);
  else if(im==='Fade')b.push(si,ei);
  else{b.push(si,ei);b2.push(ei,si);}
  const[b1,bx,b3,b4]=motorBitmasks(t.index);
  b.push(hi(b1),lo(b1),hi(bx),lo(bx),hi(b3),lo(b3),hi(b4),lo(b4));
  b2.push(hi(b1),lo(b1),hi(bx),lo(bx),hi(b3),lo(b3),hi(b4),lo(b4));
  return im==='FadeInAndOut'?b.concat(b2):b;
}

function buildElecBytes(t){
  const b=[],b2=[],im=t.intensity_mode;
  if(t.once){
    b.push(0x10,0,hi(t.start_time),lo(t.start_time),0,0,0,0);
    const si=Math.floor(t.start_intensity*ELEC);b.push(hi(si),lo(si),0,0);
    let e1=0,e2=0;for(const i of t.index){if(i<100)e1=0xF0;else e2=0xF0;}
    b.push(e1,0,e2,0);return b;
  }
  if(im==='Const')b.push(0x11,0);
  else if(im==='Fade')b.push(0x12,0);
  else{b.push(0x12,0);b2.push(0x12,0);}
  if(im==='FadeInAndOut'){
    const m=Math.floor((t.end_time+t.start_time)/2);
    b.push(hi(t.start_time),lo(t.start_time),hi(m),lo(m));
    b2.push(hi(m),lo(m),hi(t.end_time),lo(t.end_time));
  } else b.push(hi(t.start_time),lo(t.start_time),hi(t.end_time),lo(t.end_time));
  b.push(i8(t.interval),0);
  const si=Math.floor(t.start_intensity*ELEC),ei=Math.floor(t.end_intensity*ELEC);
  if(im==='Const')b.push(hi(si),lo(si),hi(si),lo(si));
  else if(im==='Fade')b.push(hi(si),lo(si),hi(ei),lo(ei));
  else{b.push(hi(si),lo(si),hi(ei),lo(ei));b2.push(hi(ei),lo(ei),hi(si),lo(si));}
  let e1=0,e2=0;for(const i of t.index){if(i<100)e1=0xF0;else e2=0xF0;}
  b.push(e1,0,e2,0);
  if(im==='FadeInAndOut'){b2.push(e1,0,e2,0);return b.concat(b2);}
  return b;
}

function buildEffectBinary(eff){
  const keep=eff.keep===true||eff.keep==='True';
  let sb=[],eb=[],sc=0,ec=0;
  for(const t of eff.tracks){
    if(t.action_type==='Stop')break;
    if(t.action_type==='Shake'){sb=sb.concat(buildShakeBytes(t,keep));sc++;if(t.intensity_mode==='FadeInAndOut')sc++;}
    if(t.action_type==='Electrical'){eb=eb.concat(buildElecBytes(t));ec++;if(t.intensity_mode==='FadeInAndOut')ec++;}
  }
  const r=[];
  if(sc>0)r.push(0x68,0x68,sc,...sb,0x16);
  if(ec>0)r.push(0x68,0x68,ec,...eb,0x16);
  return r;
}

function buildMotorPacket(idx,intensity){
  const t={intensity_mode:'Const',start_time:0,end_time:200,start_intensity:intensity,end_intensity:intensity,index:[idx],once:false,interval:0};
  const sb=buildShakeBytes(t,false,0);
  return[0x68,0x68,1,...sb,0x16];
}

const HANDSHAKE=new Uint8Array([0x68,0x68,0x01,0x02,0x00,0x00,0x00,0x01,0xF4,0x00,0x46,0xFF,0xC0,0xFF,0xC0,0xFF,0xC0,0xFF,0xC0,0x16]);

// ═══════════════════════════════════════════════════════
//  MULTI-DEVICE MANAGER
// ═══════════════════════════════════════════════════════
const devices=[];      // [{id, name, device, rxChar, status:'connected'|'reconnecting'|'disconnected', reconnectTimer, reconnectAttempts}]
let primaryDeviceId=null;
const MAX_RECONNECT=5;
const RECONNECT_DELAY=2000;

function getConnectedDevices(){ return devices.filter(d=>d.status==='connected'); }
function getPrimary(){ return devices.find(d=>d.id===primaryDeviceId&&d.status==='connected')||getConnectedDevices()[0]||null; }

async function addDevice(){
  if(!navigator.bluetooth){setStatus('❌ 请用 Chrome 或 Edge 打开','error');return;}
  try{
    setStatus('搜索设备中...','load');
    const ble=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'Truegear'}],optionalServices:[UART_SVC]
    });
    // Check if already added
    if(devices.find(d=>d.id===ble.id)){log('该设备已添加','warn');return;}
    const entry={id:ble.id,name:ble.name,device:ble,rxChar:null,status:'reconnecting',reconnectTimer:null,reconnectAttempts:0};
    devices.push(entry);
    renderDevices();
    await connectDevice(entry);
  }catch(err){
    setStatus('未选择设备','');
    if(err.name!=='NotFoundError')log('错误：'+err.message,'error');
  }
}

async function connectDevice(entry){
  try{
    entry.status='reconnecting'; renderDevices();
    log('连接中：'+entry.name,'warn');
    const server=await entry.device.gatt.connect();
    const svc=await server.getPrimaryService(UART_SVC);
    entry.rxChar=await svc.getCharacteristic(UART_RX);
    const txChar=await svc.getCharacteristic(UART_TX);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged',e=>onNotify(e,entry));
    await sendRawTo(entry.rxChar,HANDSHAKE);
    entry.status='connected'; entry.reconnectAttempts=0;
    if(!primaryDeviceId)primaryDeviceId=entry.id;
    entry.device.addEventListener('gattserverdisconnected',()=>onDeviceDisconnected(entry));
    renderDevices(); updateConnSummary(); enableControls();
    log('✅ 已连接：'+entry.name,'ok');
    setStatus('已连接：'+entry.name,'ok');
    buildBodyMap();
    renderLoadedEffects(); renderFavorites();
    showShakePanel();
  }catch(err){
    log('连接失败：'+entry.name+' '+err.message,'error');
    scheduleReconnect(entry);
  }
}

function onDeviceDisconnected(entry){
  entry.rxChar=null; entry.status='reconnecting';
  log('设备断开：'+entry.name,'warn');
  renderDevices(); updateConnSummary();
  if(getConnectedDevices().length===0){
    setStatus('设备已断开','error'); disableControls(); buildBodyMap();
  }
  scheduleReconnect(entry);
}

function scheduleReconnect(entry){
  if(entry.reconnectAttempts>=MAX_RECONNECT){
    entry.status='disconnected'; renderDevices();
    log('⚠ 重连失败：'+entry.name,'error'); return;
  }
  entry.reconnectAttempts++;
  log(`重连 ${entry.name} (${entry.reconnectAttempts}/${MAX_RECONNECT})...`,'warn');
  entry.reconnectTimer=setTimeout(()=>connectDevice(entry),RECONNECT_DELAY);
}

function removeDevice(id){
  const idx=devices.findIndex(d=>d.id===id);
  if(idx===-1)return;
  const entry=devices[idx];
  if(entry.reconnectTimer)clearTimeout(entry.reconnectTimer);
  if(entry.device&&entry.device.gatt.connected)entry.device.gatt.disconnect();
  devices.splice(idx,1);
  if(primaryDeviceId===id)primaryDeviceId=devices[0]?.id||null;
  renderDevices(); updateConnSummary();
  if(getConnectedDevices().length===0){setStatus('无连接设备','');disableControls();buildBodyMap();}
  log('移除设备：'+entry.name,'info');
}

function renderDevices(){
  const strip=document.getElementById('devices-strip');
  strip.innerHTML='';
  for(const d of devices){
    const chip=document.createElement('div');
    chip.className='device-chip'+(d.status==='connected'?' active':d.status==='reconnecting'?' reconnecting':'');
    chip.innerHTML=`<div class="dot"></div><span>${d.name}</span><span class="x" onclick="event.stopPropagation();removeDevice('${d.id}')">×</span>`;
    chip.onclick=()=>{primaryDeviceId=d.id;log('主设备：'+d.name,'ok');};
    strip.appendChild(chip);
  }
  const addBtn=document.createElement('button');
  addBtn.className='add-device-btn'; addBtn.id='btn-add-device';
  addBtn.textContent='＋ 连接设备'; addBtn.onclick=addDevice;
  strip.appendChild(addBtn);
}

function updateConnSummary(){
  const c=getConnectedDevices().length;
  document.getElementById('conn-summary').textContent=c===0?'未连接':c===1?'1台已连接':c+'台已连接';
  document.getElementById('conn-summary').style.color=c===0?'var(--dim)':c===1?'var(--green)':'var(--accent)';
}

function onNotify(event,entry){
  const data=new Uint8Array(event.target.value.buffer);
  const hex=Array.from(data).map(b=>b.toString(16).padStart(2,'0')).join(' ');
  log('← ['+entry.name+'] '+hex,'info');
  if(data.length>=19&&(data[3]===0x80||data[3]===0x81)&&entry.id===primaryDeviceId){
    updateBattery(
      convBatt(getBatt(data[9],data[10])),
      convBatt(getBatt(data[13],data[14])),
      convBatt(getBatt(data[17],data[18]))
    );
  }
}

function getBatt(a,b){return(a&0xFF)*0x100+(b&0xFF);}
function convBatt(v){if(v>3900)return 100;if(v>3700)return 75;if(v>3400)return 50;if(v>3000)return 25;if(v>2500)return 15;return 0;}
function updateBattery(v,l,r){setBatt('vest',v);setBatt('left',l);setBatt('right',r);document.getElementById('battery-row').style.display='grid';}
function setBatt(id,pct){
  const val=document.getElementById('bv-'+id),fill=document.getElementById('bf-'+id);
  val.textContent=pct+'%'; val.className='batt-val'+(pct<=15?' low':pct<=30?' mid':'');
  fill.style.width=pct+'%'; fill.className='batt-fill'+(pct<=15?' low':pct<=30?' mid':'');
}

async function sendRawTo(rxChar,data){
  for(let i=0;i<data.length;i+=128){
    const chunk=data.slice(i,i+128);
    await rxChar.writeValueWithoutResponse(chunk);
    if(i+128<data.length)await delay(30);
  }
}

async function sendToAll(binary){
  const connected=getConnectedDevices();
  if(connected.length===0){log('无已连接设备','error');return;}
  const u8=new Uint8Array(binary);
  await Promise.all(connected.map(d=>sendRawTo(d.rxChar,u8).catch(e=>log('发送失败['+d.name+']:'+e.message,'error'))));
}

let lastSend=0;
async function sendEffectObj(effObj,label,btnId){
  const binary=buildEffectBinary(effObj);
  if(binary.length===0){log('特效无有效轨道','warn');return;}
  const now=Date.now(),wait=70-(now-lastSend);
  if(wait>0)await delay(wait); lastSend=Date.now();
  log('→ '+label+' ('+binary.length+'字节)','ok');
  await sendToAll(binary);
  // Visualization: flash motors on body map
  const indices=[];
  for(const t of effObj.tracks){if(t.action_type==='Shake'&&t.index)indices.push(...t.index);}
  flashMotors([...new Set(indices)]);
  if(btnId){const btn=document.getElementById(btnId);if(btn){btn.classList.add('firing');setTimeout(()=>btn.classList.remove('firing'),400);}}
}

// ═══════════════════════════════════════════════════════
//  PRESETS
// ═══════════════════════════════════════════════════════
const EFFECTS={
  Massage:{name:"Massage",uuid:"Massage",keep:false,priority:0,tracks:[
    // 按摩：波浪式从上到下循环，轻柔恒定

    {start_time:1000,end_time:1300,stop_name:"",start_intensity:35,end_intensity:25,intensity_mode:"Fade",action_type:"Shake",once:false,interval:0,index:[16,17,18,19]}

    {start_time:300,end_time:400,stop_name:"",start_intensity:30,end_intensity:20,intensity_mode:"Const",action_type:"Shake",once:false,interval:0,index:[16,17,18,19,101,102,105,106,109,110,113,114,116,117,118,119]},
    {start_time:400,end_time:500,stop_name:"",start_intensity:30,end_intensity:20,intensity_mode:"Const",action_type:"Shake",once:false,interval:0,index:[12,13,14,15,100,103,104,107,108,111,112,115]},
    {start_time:500,end_time:600,stop_name:"",start_intensity:30,end_intensity:20,intensity_mode:"Const",action_type:"Shake",once:false,interval:0,index:[0,3,4,7,8,9,10,11]},
    {start_time:600,end_time:700,stop_name:"",start_intensity:30,end_intensity:20,intensity_mode:"Const",action_type:"Shake",once:false,interval:0,index:[1,2,5,6]}
  ]}

async function sendEffect(name){await sendEffectObj(EFFECTS[name],name,'pb-'+name.toLowerCase());}

let heartbeatTimer=null;

let currentSide='front', touchIntensity=70;
const activeMotors=new Map();
const SQ=58; // square size
const GAP=16; // gap between squares
const GRID_X=[80,154,228,302]; // centered in 440px viewBox
const GRID_Y=[3,77,151,225,299]; // centered in 360px viewBox

function motorPos(i){const row=Math.floor(i/4),col=i%4;return{x:GRID_X[col],y:GRID_Y[row]};}

function buildBodyMap(){
  const g=document.getElementById('motor-zones'); g.innerHTML='';
  const connected=getConnectedDevices().length>0||isGuest;
  for(let i=0;i<20;i++){
    const mIdx=currentSide==='front'?i:(i+100);
    const pos=motorPos(i);
    const zone=document.createElementNS('http://www.w3.org/2000/svg','g');
    zone.setAttribute('class','motor-zone'+(connected?'':' disabled'));
    zone.setAttribute('id','mz-'+mIdx);
    const c=document.createElementNS('http://www.w3.org/2000/svg','rect');
    c.setAttribute('x',pos.x);c.setAttribute('y',pos.y);
    c.setAttribute('width',SQ);c.setAttribute('height',SQ);
    c.setAttribute('rx','8');
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',pos.x+SQ/2);t.setAttribute('y',pos.y+SQ/2);
    t.textContent=mIdx<100?mIdx:(mIdx-100);
    zone.appendChild(c);zone.appendChild(t);
    zone.addEventListener('mousedown', e=>{e.preventDefault();startMotor(mIdx,zone);});
    zone.addEventListener('touchstart',e=>{e.preventDefault();startMotor(mIdx,zone);},{passive:false});
    zone.addEventListener('mouseup',   e=>{e.preventDefault();stopMotor(mIdx,zone);});
    zone.addEventListener('touchend',  e=>{e.preventDefault();stopAllMotors();},{passive:false});
    zone.addEventListener('mouseleave',e=>{stopMotor(mIdx,zone);});
    g.appendChild(zone);
  }
}

async function sendEffectObj(effObj,label,btnId){
  return sendEffectObjWithRemote(effObj,label,btnId);
}

async function fireBurst(mIdx){
  if(isGuest&&guestConn&&guestConn.open){
    const pkt=buildMotorPacket(mIdx,touchIntensity);
    guestConn.send({type:'motor',binary:Array.from(new Uint8Array(pkt)),label:'马达'+mIdx});
    return;
  }
  const connected=getConnectedDevices();
  if(!connected.length)return;
  try{const pkt=new Uint8Array(buildMotorPacket(mIdx,touchIntensity));await sendToAll(Array.from(pkt));}catch(e){}
}

function startMotor(mIdx,zone){
  if((!getConnectedDevices().length&&!isGuest)||activeMotors.has(mIdx))return;
  zone.classList.add('active');
  fireBurst(mIdx);
  activeMotors.set(mIdx,setInterval(()=>fireBurst(mIdx),150));
}
function stopMotor(mIdx,zone){
  if(!activeMotors.has(mIdx))return;
  clearInterval(activeMotors.get(mIdx));activeMotors.delete(mIdx);zone.classList.remove('active');
}
function stopAllMotors(){for(const[i,id]of activeMotors){clearInterval(id);const z=document.getElementById('mz-'+i);if(z)z.classList.remove('active');}activeMotors.clear();}

document.getElementById('body-svg').addEventListener('touchmove',e=>{
  e.preventDefault();
  const touch=e.touches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  if(!el)return;
  const zone=el.closest('.motor-zone');
  if(!zone)return;
  const mIdx=parseInt(zone.id.replace('mz-',''));
  if(isNaN(mIdx))return;
  for(const[idx,id]of activeMotors){if(idx!==mIdx){clearInterval(id);activeMotors.delete(idx);const z=document.getElementById('mz-'+idx);if(z)z.classList.remove('active');}}
  if(!activeMotors.has(mIdx))startMotor(mIdx,zone);
},{passive:false});

function setSide(s){
  currentSide=s;
  document.getElementById('side-front').classList.toggle('active',s==='front');
  document.getElementById('side-back').classList.toggle('active',s==='back');
  stopAllMotors(); buildBodyMap();
}
function updateIntensity(v){
  touchIntensity=parseInt(v);
  document.getElementById('intensity-val').textContent=v;
  document.getElementById('intensity-slider').style.setProperty('--val',v+'%');
}

// Flash motor zones for visualization
function flashMotors(indices){
  for(const idx of indices){
    let mIdx;
    if(currentSide==='front'&&idx<100)mIdx=idx;
    else if(currentSide==='back'&&idx>=100)mIdx=idx;
    else continue;
    const zone=document.getElementById('mz-'+mIdx);
    if(!zone||activeMotors.has(mIdx))continue;
    zone.classList.add('flash');
    setTimeout(()=>zone.classList.remove('flash'),350);
  }
}

const loadedEffects=[];

function normalizeEffect(json){
  if(typeof json.keep==='string')json.keep=json.keep==='True';
  if(json.tracks)for(const t of json.tracks){if(typeof t.once==='string')t.once=t.once==='True';}
  return json;
}

function loadFiles(files){
  for(const f of files){
    const r=new FileReader();
    r.onload=e=>{
      try{
        const json=normalizeEffect(JSON.parse(e.target.result));
        if(!json.name)throw new Error('无效文件');
        loadedEffects.push({name:json.name,effect:json});
        renderLoadedEffects(); log('已加载：'+json.name,'ok');
      }catch(err){log('格式错误：'+f.name,'error');}
    };
    r.readAsText(f);
  }
}

function renderLoadedEffects(){
  const c=document.getElementById('loaded-list'); c.innerHTML='';
  for(let i=0;i<loadedEffects.length;i++){
    const{name,effect}=loadedEffects[i];
    const div=document.createElement('div'); div.className='effect-row';
    div.innerHTML=`<div class="effect-row-info"><div class="name">${name}</div><div class="meta">${effect.tracks?.length||0} 轨道</div></div>
    <div class="effect-row-btns">
      <button class="btn-sm btn-send" id="lf-${i}" onclick="sendLoadedEffect(${i})" ${getConnectedDevices().length?'':'disabled'}>发送</button>
      <button class="btn-sm btn-save" onclick="saveToFav(${i})">⭐</button>
    </div>`;
    c.appendChild(div);
  }
}

async function sendLoadedEffect(i){await sendEffectObj(loadedEffects[i].effect,loadedEffects[i].name,'lf-'+i);}
function saveToFav(i){
  const{name,effect}=loadedEffects[i];
  const favs=getFavs(); favs.push({name,effect}); setFavs(favs);

}

//  REMOTE CONTROL (PeerJS)
// ═══════════════════════════════════════════════════════
let peer=null;
let hostConns=[]; // host: list of guest connections
let guestConn=null; // guest: connection to host
let isGuest=false;

function initPeer(){
  if(peer&&!peer.destroyed)return;
  const id='TG-'+Math.random().toString(36).substr(2,6).toUpperCase();
  peer=new Peer(id,{debug:0});
  peer.on('open',id=>{
    document.getElementById('my-room-code').textContent=id.replace('TG-','');
    log('房间码就绪：'+id.replace('TG-',''),'ok');
  });
  peer.on('connection',conn=>{
    conn.on('open',()=>{
      hostConns.push(conn);
      log('👤 访客已连接：'+conn.peer,'ok');
      updateHostPeers();
      setRemoteStatus('已连接 '+hostConns.length+' 位访客');
    });
    conn.on('data',data=>handleRemoteData(data));
    conn.on('close',()=>{
      hostConns=hostConns.filter(c=>c!==conn);
      log('👤 访客已断开','warn');
      updateHostPeers();
      setRemoteStatus(hostConns.length>0?'已连接 '+hostConns.length+' 位访客':'未连接');
    });
  });
  peer.on('error',e=>log('联机错误：'+e.message,'error'));
}

function connectAsGuest(){
  const code=document.getElementById('guest-code-input').value.trim();
  if(code.length<4){document.getElementById('guest-info').textContent='请输入完整房间码';return;}
  if(!peer||peer.destroyed)peer=new Peer(undefined,{debug:0});
  document.getElementById('guest-info').textContent='连接中...';
  document.getElementById('btn-guest-connect').disabled=true;
  const hostId='TG-'+code.toUpperCase();
  guestConn=peer.connect(hostId,{reliable:true});
  guestConn.on('open',()=>{
    isGuest=true;
    document.getElementById('guest-info').textContent='✅ 已连接主机，可以开始控制！';
    document.getElementById('guest-info').style.color='var(--green)';
    setRemoteStatus('访客模式·已连接');
    log('🌐 已连接主机，远程控制模式开启','ok');
    document.getElementById('btn-guest-connect').disabled=false;
    // Enable all controls for guest (they send to host, not local BLE)
    document.querySelectorAll('.preset-btn').forEach(b=>b.disabled=false);
    document.querySelectorAll('.effect-btn,.btn-send-loaded').forEach(b=>b.disabled=false);
    document.getElementById('ed-btn-send').disabled=false;
    buildBodyMap();
  });
  guestConn.on('close',()=>{
    isGuest=false; guestConn=null;
    document.getElementById('guest-info').textContent='连接已断开';
    document.getElementById('guest-info').style.color='';
    setRemoteStatus('未连接');
    log('🌐 与主机的连接断开','warn');
  });
  guestConn.on('error',e=>{
    document.getElementById('guest-info').textContent='连接失败：'+e.message;
    document.getElementById('btn-guest-connect').disabled=false;
  });
}

// Guest sends effect data to host
async function sendRemoteEffect(binary,label){
  if(!guestConn||!guestConn.open){log('未连接主机','error');return;}
  guestConn.send({type:'effect',binary:Array.from(binary),label});
  log('🌐 远程发送：'+label,'ok');
}

// Host receives and executes
async function handleRemoteData(data){
  if(data.type==='effect'){
    log('🌐 收到远程指令：'+data.label,'ok');
    const binary=new Uint8Array(data.binary);
    await sendToAll(Array.from(binary));
    // Visualize on host body map
    flashMotors(data.motorIndices||[]);
  }
}

// Override sendEffectObj to route via peer if guest
const _origSendEffectObj=null;
async function sendEffectObjWithRemote(effObj,label,btnId){
  const binary=buildEffectBinary(effObj);
  if(binary.length===0){log('特效无有效轨道','warn');return;}
  const now=Date.now(),wait=70-(now-lastSend);
  if(wait>0)await delay(wait); lastSend=Date.now();

  const indices=[];
  if(effObj.tracks)for(const t of effObj.tracks){if(t.action_type==='Shake'&&t.index)indices.push(...t.index);}

  if(isGuest&&guestConn&&guestConn.open){
    // Send to host via PeerJS
    guestConn.send({type:'effect',binary:Array.from(new Uint8Array(binary)),label,motorIndices:indices});
    log('🌐 远程→主机：'+label+' ('+binary.length+'字节)','ok');
    flashMotors([...new Set(indices)]);
  } else {
    // Send locally via BLE
    log('→ '+label+' ('+binary.length+'字节)','ok');
    await sendToAll(binary);
    flashMotors([...new Set(indices)]);
  }
  if(btnId){const btn=document.getElementById(btnId);if(btn){btn.classList.add('firing');setTimeout(()=>btn.classList.remove('firing'),400);}}
}

// Guest also sends motor burst via remote
async function sendMotorBurstRemote(mIdx,intensity){
  if(!isGuest||!guestConn||!guestConn.open)return;
  const pkt=buildMotorPacket(mIdx,intensity);
  guestConn.send({type:'motor',binary:Array.from(new Uint8Array(pkt)),label:'马达'+mIdx});
}

async function handleRemoteData(data){

// ═══════════════════════════════════════════════════════
//  LIQUID GRAVITY SIMULATION
// ═══════════════════════════════════════════════════════
let shakeEnabled=false;
let orientationListener=null;
let liquidAnimFrame=null;

// Physics state
const liquid={
  x:0.5,  // water center X (0-1)
  y:0.5,  // water center Y (0-1)
  vx:0,   // velocity X
  vy:0,   // velocity Y
  gx:0,   // gravity X (from tilt)
  gy:0,   // gravity Y (from tilt)
};

// Motor grid layout for liquid mapping
// Front: 20 motors in 4 cols × 5 rows
// motorIndex = row*4 + col → maps to liquid position
const MOTOR_COLS=4, MOTOR_ROWS=5;

// Track which motors are currently active via liquid
const liquidActiveMotors=new Set();
let liquidLastSend=0;

function toggleShake(){
  if(!shakeEnabled){
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().then(s=>{
        if(s==='granted')enableShake();
        else{log('方向权限被拒绝','error');}
      }).catch(e=>log('权限失败：'+e.message,'error'));
    } else {
      enableShake();
    }
  } else {
    disableShake();
  }
}

function enableShake(){
  shakeEnabled=true;
  document.getElementById('shake-track').classList.add('on');
  document.getElementById('shake-toggle-label').textContent='开启';
  document.getElementById('shake-toggle-label').style.color='var(--green)';
  document.getElementById('liquid-label').style.display='none';

  orientationListener=e=>onOrientation(e);
  window.addEventListener('deviceorientation',orientationListener);

  startLiquidLoop();
  log('💧 液体感应已开启','ok');
}

function disableShake(){
  shakeEnabled=false;
  document.getElementById('shake-track').classList.remove('on');
  document.getElementById('shake-toggle-label').textContent='关闭';
  document.getElementById('shake-toggle-label').style.color='var(--dim)';
  document.getElementById('liquid-label').style.display='';
  if(orientationListener)window.removeEventListener('deviceorientation',orientationListener);
  if(liquidAnimFrame)cancelAnimationFrame(liquidAnimFrame);
  // Stop all liquid motors
  stopAllLiquidMotors();
  // Clear canvas
  const cv=document.getElementById('liquid-canvas');
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
}

function onOrientation(e){
  // gamma = left/right tilt (-90 to 90)
  // beta  = front/back tilt (-180 to 180)
  const gamma=e.gamma||0;  // X gravity
  const beta =(e.beta ||0)-45; // Y gravity (subtract resting angle)
  // Normalize to -1..1
  liquid.gx=Math.max(-1,Math.min(1, gamma/45));
  liquid.gy=Math.max(-1,Math.min(1, beta /60));
}

function startLiquidLoop(){
  const cv=document.getElementById('liquid-canvas');
  // Set actual pixel size
  cv.width=cv.offsetWidth||cv.parentElement.offsetWidth||320;
  cv.height=100;

  function loop(){
    if(!shakeEnabled)return;
    updateLiquidPhysics();
    drawLiquid();
    updateLiquidMotors();
    liquidAnimFrame=requestAnimationFrame(loop);
  }
  loop();
}

function updateLiquidPhysics(){
  const friction=0.88, gravity=0.018;
  // Apply gravity from tilt
  liquid.vx+=liquid.gx*gravity;
  liquid.vy+=liquid.gy*gravity;
  // Friction
  liquid.vx*=friction;
  liquid.vy*=friction;
  // Move center
  liquid.x+=liquid.vx;
  liquid.y+=liquid.vy;
  // Bounce off walls (water stays in container)
  const vol=parseFloat(document.getElementById('liquid-volume').value)||0.45;
  const halfW=vol*0.6, halfH=vol*0.5;
  if(liquid.x<halfW){ liquid.x=halfW; liquid.vx*=-0.5; }
  if(liquid.x>1-halfW){ liquid.x=1-halfW; liquid.vx*=-0.5; }
  if(liquid.y<halfH){ liquid.y=halfH; liquid.vy*=-0.5; }
  if(liquid.y>1-halfH){ liquid.y=1-halfH; liquid.vy*=-0.5; }
}

function drawLiquid(){
  const cv=document.getElementById('liquid-canvas');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);

  const vol=parseFloat(document.getElementById('liquid-volume').value)||0.45;
  const rw=vol*W*0.9, rh=vol*H*1.5;
  const cx=liquid.x*W, cy=liquid.y*H;

  // Outer glow
  const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,rw);
  glow.addColorStop(0,'rgba(0,229,255,0.25)');
  glow.addColorStop(0.6,'rgba(124,58,237,0.12)');
  glow.addColorStop(1,'rgba(0,229,255,0)');
  ctx.fillStyle=glow;
  ctx.beginPath();
  ctx.ellipse(cx,cy,rw*1.3,rh*0.9,0,0,Math.PI*2);
  ctx.fill();

  // Main liquid blob
  const grad=ctx.createRadialGradient(cx-rw*0.2,cy-rh*0.2,0,cx,cy,rw);
  grad.addColorStop(0,'rgba(0,229,255,0.9)');
  grad.addColorStop(0.4,'rgba(0,180,255,0.7)');
  grad.addColorStop(0.8,'rgba(124,58,237,0.5)');
  grad.addColorStop(1,'rgba(124,58,237,0.0)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  // Slightly wobbly ellipse using bezier
  const wobX=rw*(1+Math.sin(Date.now()/400)*0.08);
  const wobY=rh*(1+Math.cos(Date.now()/500)*0.08);
  ctx.ellipse(cx,cy,wobX,wobY,liquid.vx*2,0,Math.PI*2);
  ctx.fill();

  // Specular highlight
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(cx-rw*0.25,cy-rh*0.3,rw*0.22,rh*0.18,0,0,Math.PI*2);
  ctx.fill();

  // Speed indicator ring
  const speed=Math.sqrt(liquid.vx*liquid.vx+liquid.vy*liquid.vy);
  if(speed>0.003){
    ctx.strokeStyle=`rgba(0,229,255,${Math.min(speed*30,0.6)})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.ellipse(cx,cy,wobX+6,wobY+4,liquid.vx*2,0,Math.PI*2);
    ctx.stroke();
  }
}

async function updateLiquidMotors(){
  const connected=getConnectedDevices().length>0||(isGuest&&guestConn&&guestConn.open);
  if(!connected)return;

  // Rate limit motor sends
  const now=Date.now();
  if(now-liquidLastSend<120)return;
  liquidLastSend=now;

  const vol=parseFloat(document.getElementById('liquid-volume').value)||0.45;
  const intensity=parseInt(document.getElementById('liquid-intensity').value)||60;

  // Map liquid center to motor grid
  // liquid.x/y are 0-1 across the canvas
  // Map to motor col/row
  const motorX=liquid.x*(MOTOR_COLS-1);
  const motorY=liquid.y*(MOTOR_ROWS-1);

  // Determine which motors are covered by the liquid blob
  const radius=vol*2.0; // in motor-grid units
  const newActive=new Set();

  for(let row=0;row<MOTOR_ROWS;row++){
    for(let col=0;col<MOTOR_COLS;col++){
      const dx=col-motorX, dy=row-motorY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<=radius){
        const mIdx=currentSide==='front'?(row*MOTOR_COLS+col):(100+row*MOTOR_COLS+col);
        newActive.add(mIdx);
      }
    }
  }

  // Only send to newly active motors
  for(const mIdx of newActive){
    if(!liquidActiveMotors.has(mIdx)){
      // Scale intensity by how centered the motor is
      const col=mIdx<100?(mIdx%MOTOR_COLS):((mIdx-100)%MOTOR_COLS);
      const row=mIdx<100?Math.floor(mIdx/MOTOR_COLS):Math.floor((mIdx-100)/MOTOR_COLS);
      const dx=col-motorX, dy=row-motorY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const scaledIntensity=Math.round(intensity*(1-dist/radius)*0.8+intensity*0.2);

      sendLiquidBurst(mIdx, Math.min(scaledIntensity,100));
      flashMotorZone(mIdx);
    }
  }

  // Update active set
  liquidActiveMotors.clear();
  for(const m of newActive)liquidActiveMotors.add(m);

  // Update log
  const speed=Math.sqrt(liquid.vx*liquid.vx+liquid.vy*liquid.vy);
  if(speed>0.004&&newActive.size>0){
    const sl=document.getElementById('shake-log');
    sl.textContent=`💧 激活 ${newActive.size} 个马达 · 强度 ${intensity}`;
    sl.className='shake-log triggered';
  } else if(newActive.size===0){
    const sl=document.getElementById('shake-log');
    sl.textContent='倾斜手机让液体流动...';
    sl.className='shake-log';
  }
}

function stopAllLiquidMotors(){
  liquidActiveMotors.clear();
}

async function sendLiquidBurst(mIdx, intensity){
  const pkt=buildMotorPacket(mIdx, intensity);
  if(isGuest&&guestConn&&guestConn.open){
    guestConn.send({type:'motor',binary:Array.from(new Uint8Array(pkt)),label:'液体马达'+mIdx});
  } else {
    const connected=getConnectedDevices();
    if(!connected.length)return;
    try{await sendToAll(Array.from(pkt));}catch(e){}
  }
}

function flashMotorZone(mIdx){
  // Only flash if on correct side
  if(currentSide==='front'&&mIdx>=100)return;
  if(currentSide==='back'&&mIdx<100)return;
  const zone=document.getElementById('mz-'+mIdx);
  if(!zone||activeMotors.has(mIdx))return;
  zone.classList.add('flash');
  setTimeout(()=>zone.classList.remove('flash'),200);
}

function showShakePanel(){
  document.getElementById('shake-panel').classList.add('show');
}

// Init
buildBodyMap();
buildMotorPicker();
renderFavorites();
renderDevices();
initPeer();
</script>
