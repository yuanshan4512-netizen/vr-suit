<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>音乐体感同步</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#04060f;--bg2:#080d1a;--bg3:#0d1525;--border:#1a2540;
      --accent:#00e5ff;--accent2:#7c3aed;--green:#00ff88;
      --red:#ff3366;--yellow:#ffcc00;--text:#c8d8f0;--dim:#3a4a6a;
      --font-hd:'Orbitron',monospace;--font-mono:'Share Tech Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';pointer-events:none;position:fixed;inset:0;z-index:9999;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);}

    .app{max-width:480px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:10px;}

    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;border-bottom:1px solid var(--border);}
    .logo{font-family:var(--font-hd);font-size:17px;font-weight:900;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px var(--accent);}
    .logo span{color:var(--accent2);}
    .back-btn{font-size:11px;color:var(--dim);text-decoration:none;border:1px solid var(--border);
      padding:4px 10px;border-radius:6px;transition:all .2s;}
    .back-btn:hover{color:var(--accent);border-color:var(--accent);}

    /* Status */
    .status-line{font-size:11px;color:var(--dim);text-align:center;letter-spacing:1px;min-height:16px;}
    .status-line.ok{color:var(--green);}
    .status-line.error{color:var(--red);}
    .status-line.load{color:var(--yellow);}

    /* Card */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;}
    .card-title{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;}

    /* Upload */
    .upload-zone{border:1px dashed var(--border);border-radius:10px;padding:24px;text-align:center;
      cursor:pointer;transition:all .2s;position:relative;}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(0,229,255,.03);}
    .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
    .upload-icon{font-size:28px;margin-bottom:6px;}
    .upload-text{font-size:13px;color:var(--dim);letter-spacing:1px;}

    /* Track info */
    .track-info{display:none;align-items:center;gap:12px;padding:10px 0;}
    .track-info.show{display:flex;}
    .track-icon{font-size:28px;}
    .track-name{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .track-dur{font-size:11px;color:var(--dim);}

    /* Waveform / spectrum canvas */
    .viz-wrap{border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);position:relative;}
    #waveform-canvas{display:block;width:100%;height:80px;}
    #spectrum-canvas{display:block;width:100%;height:100px;}
    .viz-label{position:absolute;top:6px;left:8px;font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}

    /* Transport */
    .transport{display:flex;align-items:center;gap:10px;margin-top:4px;}
    .play-btn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;transition:all .2s;
      background:linear-gradient(135deg,var(--accent2),#4f46e5);color:white;font-size:20px;flex-shrink:0;}
    .play-btn:disabled{opacity:.3;cursor:not-allowed;}
    .progress-wrap{flex:1;height:4px;background:var(--bg3);border-radius:2px;cursor:pointer;position:relative;}
    .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .1s linear;width:0%;}
    .time-label{font-size:11px;color:var(--dim);white-space:nowrap;font-family:var(--font-mono);}

    /* Settings */
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .setting{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
    .setting label{font-size:9px;color:var(--dim);letter-spacing:2px;display:block;margin-bottom:4px;text-transform:uppercase;}
    .setting select,.setting input[type=range]{width:100%;background:transparent;border:none;
      color:var(--text);font-family:var(--font-mono);font-size:11px;outline:none;cursor:pointer;}
    .setting select option{background:var(--bg3);}
    .setting input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;
      background:linear-gradient(to right,var(--accent) var(--val,50%),var(--bg) var(--val,50%));}
    .setting input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
      border-radius:50%;background:var(--accent);cursor:pointer;}
    .setting-val{font-size:12px;color:var(--accent);text-align:right;margin-top:2px;font-family:var(--font-hd);}

    /* Beat visualizer - body map flash */
    .beat-map{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:4px;}
    .beat-cell{border-radius:5px;background:var(--bg3);border:1px solid var(--border);
      aspect-ratio:1;transition:all .1s;display:flex;align-items:center;justify-content:center;
      font-size:8px;color:var(--dim);}
    .beat-cell.front{border-color:rgba(0,229,255,.2);}
    .beat-cell.back {border-color:rgba(0,255,136,.2);}
    .beat-cell.active-low {background:rgba(0,229,255,.8);border-color:var(--accent);box-shadow:0 0 8px var(--accent);color:var(--bg);}
    .beat-cell.active-mid {background:rgba(124,58,237,.7);border-color:var(--accent2);color:white;}
    .beat-cell.active-hi  {background:rgba(0,255,136,.5);border-color:var(--green);color:var(--bg);}

    /* BLE status */
    .ble-row{display:flex;align-items:center;justify-content:space-between;}
    .ble-chip{display:flex;align-items:center;gap:5px;font-size:11px;}
    .ble-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);}
    .ble-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

    .btn{padding:10px 20px;border:none;border-radius:8px;font-family:var(--font-mono);
      font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .btn:disabled{opacity:.3;cursor:not-allowed;}
    .btn-primary{background:linear-gradient(135deg,var(--accent2),#4f46e5);color:white;}
    .btn-sm{padding:6px 14px;font-size:11px;border-radius:6px;}
    .btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,51,102,.4);}

    /* Beat log */
    .beat-log{font-size:11px;color:var(--dim);text-align:center;min-height:14px;letter-spacing:1px;}
    .beat-log.kick{color:var(--accent);}
    .beat-log.bass{color:var(--accent2);}
    .beat-log.hi{color:var(--green);}

    /* Sensitivity bars */
    .freq-bars{display:flex;gap:3px;height:40px;align-items:flex-end;margin-top:8px;}
    .freq-bar{flex:1;border-radius:2px 2px 0 0;transition:height .05s;min-height:2px;}
    .freq-bar.low{background:var(--accent);}
    .freq-bar.mid{background:var(--accent2);}
    .freq-bar.hi {background:var(--green);}
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">TRUE<span>GEAR</span></div>
    <a href="index.html" class="back-btn">← 控制台</a>
  </div>

  <div class="status-line" id="status">上传MP3开始体验</div>

  <!-- BLE connection -->
  <div class="card">
    <div class="ble-row">
      <div class="ble-chip">
        <div class="ble-dot" id="ble-dot"></div>
        <span id="ble-label">未连接体感服</span>
      </div>
      <button class="btn btn-primary btn-sm" id="btn-ble" onclick="connectBLE()">连接体感服</button>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="card-title">🎵 音乐文件</div>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="audio/*" onchange="loadAudio(this.files[0])">
      <div class="upload-icon">🎵</div>
      <div class="upload-text">点击上传 MP3 / WAV / AAC</div>
    </div>
    <div class="track-info" id="track-info">
      <div class="track-icon">🎶</div>
      <div class="track-name" id="track-name">—</div>
      <div class="track-dur" id="track-dur">0:00</div>
    </div>
  </div>

  <!-- Waveform -->
  <div class="card">
    <div class="card-title">📊 波形 & 节拍</div>
    <div class="viz-wrap" style="margin-bottom:6px;">
      <span class="viz-label">WAVEFORM</span>
      <canvas id="waveform-canvas"></canvas>
    </div>
    <div class="viz-wrap">
      <span class="viz-label">SPECTRUM</span>
      <canvas id="spectrum-canvas"></canvas>
    </div>
    <!-- Transport -->
    <div class="transport" style="margin-top:10px;">
      <button class="play-btn" id="play-btn" onclick="togglePlay()" disabled>▶</button>
      <div class="progress-wrap" id="progress-wrap" onclick="seekAudio(event)">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time-label" id="time-label">0:00 / 0:00</span>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="card-title">⚙️ 体感参数</div>
    <div class="settings-grid">
      <div class="setting">
        <label>振动模式</label>
        <select id="haptic-mode">
          <option value="beat">节拍模式（跳舞/现场）</option>
          <option value="immersive">沉浸模式（游戏/电影）</option>
          <option value="bass">低音模式（Bass增强）</option>
        </select>
      </div>
      <div class="setting">
        <label>振动强度</label>
        <input type="range" id="haptic-intensity" min="20" max="100" value="70"
               oninput="updateIntensity(this.value)" style="--val:70%">
        <div class="setting-val" id="intensity-val">70</div>
      </div>
      <div class="setting">
        <label>节拍灵敏度</label>
        <input type="range" id="beat-sensitivity" min="1" max="10" value="5"
               oninput="updateSensitivity(this.value)" style="--val:50%">
        <div class="setting-val" id="sensitivity-val">5</div>
      </div>
      <div class="setting">
        <label>扩散效果</label>
        <select id="spread-mode">
          <option value="center">中心扩散</option>
          <option value="wave">波浪扩散</option>
          <option value="random">随机跳动</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Beat visualizer -->
  <div class="card">
    <div class="card-title">💥 实时体感分布</div>
    <div class="beat-map" id="beat-map"></div>
    <div style="display:flex;gap:12px;margin-top:8px;justify-content:center;">
      <span style="font-size:9px;color:var(--accent)">■ 鼓点/低频</span>
      <span style="font-size:9px;color:var(--accent2)">■ 中频</span>
      <span style="font-size:9px;color:var(--green)">■ 高频</span>
    </div>
    <!-- Real-time freq bars -->
    <div class="freq-bars" id="freq-bars"></div>
    <div class="beat-log" id="beat-log">等待音乐...</div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  BLE (same protocol as main app)
// ═══════════════════════════════════════════
const UART_SVC='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_RX ='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const FD1=[1,1,4,4,1,1,4,4,1,1,4,4,1,1,4,4,1,1,4,4];
const FD2=[0x8000,0x0400,0x8000,0x0400,0x4000,0x0200,0x4000,0x0200,
           0x2000,0x0100,0x2000,0x0100,0x1000,0x0080,0x1000,0x0080,0x0800,0x0040,0x0800,0x0040];
const BD1=[2,2,3,3,2,2,3,3,2,2,3,3,2,2,3,3,2,2,3,3];
const BD2=[...FD2];
const hi=v=>(v>>8)&0xFF, lo=v=>v&0xFF, i8=v=>v&0xFF;
const HANDSHAKE=new Uint8Array([0x68,0x68,0x01,0x02,0x00,0x00,0x00,0x01,
  0xF4,0x00,0x46,0xFF,0xC0,0xFF,0xC0,0xFF,0xC0,0xFF,0xC0,0x16]);

let bleDevice=null, rxChar=null;
let sending=false; // simple send lock

function motorBitmasks(indices){
  let b1=0,b2=0,b3=0,b4=0;
  for(const i of indices){
    if(i<100){if(FD1[i]===1)b1|=FD2[i];if(FD1[i]===4)b4|=FD2[i];}
    else{const j=i-100;if(BD1[j]===2)b2|=BD2[j];if(BD1[j]===3)b3|=BD2[j];}
  }
  return[b1,b2,b3,b4];
}

function buildShake(indices,intensity,durationMs){
  const[b1,b2,b3,b4]=motorBitmasks(indices);
  const si=i8(intensity),ei=Math.max(5,Math.round(intensity*0.1));
  const et=Math.min(durationMs,1000);
  const bytes=[2,0, 0,0, hi(et),lo(et), si,ei,
               hi(b1),lo(b1),hi(b2),lo(b2),hi(b3),lo(b3),hi(b4),lo(b4)];
  return new Uint8Array([0x68,0x68,1,...bytes,0x16]);
}

async function sendHaptic(pkt){
  if(!rxChar||sending)return;
  sending=true;
  try{ await rxChar.writeValueWithoutResponse(pkt); }catch(e){}
  sending=false;
}

async function connectBLE(){
  if(!navigator.bluetooth){setStatus('❌ 请用 Chrome 或 Edge','error');return;}
  try{
    setStatus('搜索体感服...','load');
    bleDevice=await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'Truegear'}],optionalServices:[UART_SVC]
    });
    const server=await bleDevice.gatt.connect();
    const svc=await server.getPrimaryService(UART_SVC);
    rxChar=await svc.getCharacteristic(UART_RX);
    await rxChar.writeValueWithoutResponse(HANDSHAKE);
    document.getElementById('ble-dot').classList.add('on');
    document.getElementById('ble-label').textContent=bleDevice.name;
    document.getElementById('btn-ble').textContent='已连接';
    document.getElementById('btn-ble').disabled=true;
    bleDevice.addEventListener('gattserverdisconnected',()=>{
      rxChar=null;
      document.getElementById('ble-dot').classList.remove('on');
      document.getElementById('ble-label').textContent='已断开';
      document.getElementById('btn-ble').disabled=false;
      document.getElementById('btn-ble').textContent='重新连接';
    });
    setStatus('已连接：'+bleDevice.name,'ok');
  }catch(e){
    setStatus('连接失败','error');
  }
}

// ═══════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════
let audioCtx=null;
let audioBuffer=null;
let sourceNode=null;
let analyser=null;
let gainNode=null;
let isPlaying=false;
let startTime=0;
let pauseOffset=0;
let animFrameId=null;

// Onset detection state
const HISTORY_LEN=43; // ~1 second at 23ms frames
const freqBands={
  kick: {lo:20,  hi:120, history:new Float32Array(HISTORY_LEN), ptr:0, lastTrigger:0, minInterval:180},
  bass: {lo:120, hi:280, history:new Float32Array(HISTORY_LEN), ptr:0, lastTrigger:0, minInterval:120},
  mid:  {lo:280, hi:800, history:new Float32Array(HISTORY_LEN), ptr:0, lastTrigger:0, minInterval:100},
  hi:   {lo:800, hi:4000,history:new Float32Array(HISTORY_LEN), ptr:0, lastTrigger:0, minInterval:80},
};

async function loadAudio(file){
  if(!file)return;
  setStatus('解析音频中...','load');
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=await file.arrayBuffer();
    audioBuffer=await audioCtx.decodeAudioData(buf);
    // Draw waveform
    drawWaveform(audioBuffer);
    // UI
    document.getElementById('track-name').textContent=file.name.replace(/\.[^.]+$/,'');
    document.getElementById('track-dur').textContent=formatTime(audioBuffer.duration);
    document.getElementById('track-info').classList.add('show');
    document.getElementById('play-btn').disabled=false;
    document.getElementById('upload-zone').style.display='none';
    pauseOffset=0;
    setStatus('解析完成，按播放开始','ok');
    document.getElementById('beat-log').textContent='准备就绪';
  }catch(e){
    setStatus('解析失败：'+e.message,'error');
  }
}

function drawWaveform(buf){
  const cv=document.getElementById('waveform-canvas');
  cv.width=cv.offsetWidth||440; cv.height=80;
  const ctx=cv.getContext('2d');
  const data=buf.getChannelData(0);
  const step=Math.floor(data.length/cv.width);
  ctx.clearRect(0,0,cv.width,cv.height);
  const mid=cv.height/2;
  ctx.strokeStyle='rgba(0,229,255,0.6)';
  ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<cv.width;x++){
    let max=0;
    for(let j=0;j<step;j++){const v=Math.abs(data[x*step+j]||0);if(v>max)max=v;}
    const h=max*mid*0.9;
    ctx.moveTo(x,mid-h); ctx.lineTo(x,mid+h);
  }
  ctx.stroke();
}

function startAudio(){
  if(!audioCtx||!audioBuffer)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  sourceNode=audioCtx.createBufferSource();
  sourceNode.buffer=audioBuffer;
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=2048;
  analyser.smoothingTimeConstant=0.75;
  gainNode=audioCtx.createGain();
  gainNode.gain.value=1;
  sourceNode.connect(analyser);
  analyser.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  sourceNode.start(0,pauseOffset);
  startTime=audioCtx.currentTime-pauseOffset;
  isPlaying=true;
  document.getElementById('play-btn').textContent='⏸';
  animFrameId=requestAnimationFrame(analysisLoop);
  sourceNode.onended=()=>{
    if(isPlaying){isPlaying=false;pauseOffset=0;document.getElementById('play-btn').textContent='▶';}
    cancelAnimationFrame(animFrameId);
  };
}

function stopAudio(){
  if(sourceNode)try{sourceNode.stop();sourceNode.disconnect();}catch(e){}
  cancelAnimationFrame(animFrameId);
  isPlaying=false;
  document.getElementById('play-btn').textContent='▶';
}

function togglePlay(){
  if(!audioBuffer)return;
  if(isPlaying){
    pauseOffset=audioCtx.currentTime-startTime;
    stopAudio();
  } else {
    startAudio();
  }
}

function seekAudio(e){
  if(!audioBuffer)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  pauseOffset=pct*audioBuffer.duration;
  if(isPlaying){stopAudio();startAudio();}
  else{document.getElementById('progress-fill').style.width=(pct*100)+'%';}
}

// ═══════════════════════════════════════════
//  ANALYSIS LOOP - runs every animation frame
// ═══════════════════════════════════════════
const freqData=new Uint8Array(1024);
const timeData=new Uint8Array(2048);
let waveformPlayPos=0;

function analysisLoop(){
  if(!isPlaying){return;}
  animFrameId=requestAnimationFrame(analysisLoop);

  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const currentTime=audioCtx.currentTime-startTime;
  const progress=currentTime/audioBuffer.duration;
  document.getElementById('progress-fill').style.width=(Math.min(progress,1)*100)+'%';
  document.getElementById('time-label').textContent=
    formatTime(currentTime)+' / '+formatTime(audioBuffer.duration);

  // Draw spectrum
  drawSpectrum(freqData);

  // Get band energies
  const sampleRate=audioCtx.sampleRate;
  const binHz=sampleRate/(analyser.fftSize);

  const energies={};
  for(const[name,band]of Object.entries(freqBands)){
    const loB=Math.floor(band.lo/binHz);
    const hiB=Math.floor(band.hi/binHz);
    let sum=0;
    for(let i=loB;i<=hiB&&i<freqData.length;i++)sum+=freqData[i];
    energies[name]=(sum/(hiB-loB+1))/255;
  }

  // Onset detection per band
  const now=performance.now();
  const sensitivity=parseInt(document.getElementById('beat-sensitivity').value)||5;
  const thresh=1.8-sensitivity*0.08; // higher sensitivity = lower threshold

  for(const[name,band]of Object.entries(freqBands)){
    const e=energies[name];
    // Running average
    const avg=band.history.reduce((a,b)=>a+b,0)/HISTORY_LEN;
    band.history[band.ptr]=e;
    band.ptr=(band.ptr+1)%HISTORY_LEN;

    // Onset: current energy >> recent average
    if(e>avg*thresh && e>0.15 && now-band.lastTrigger>band.minInterval){
      band.lastTrigger=now;
      triggerHapticBand(name,e);
    }
  }

  // Update freq bar visualization
  updateFreqBars(energies);
}

function drawSpectrum(data){
  const cv=document.getElementById('spectrum-canvas');
  if(!cv.width||cv.width<10){cv.width=cv.offsetWidth||440;cv.height=100;}
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Only show 0-4kHz range (perceptually relevant)
  const bins=Math.min(data.length,256);
  const bw=W/bins;

  for(let i=0;i<bins;i++){
    const v=data[i]/255;
    const h=v*H*0.9;
    // Color by frequency range
    const hue=i<30?'rgba(0,229,255':i<70?'rgba(124,58,237':'rgba(0,255,136';
    ctx.fillStyle=`${hue},${0.5+v*0.5})`;
    ctx.fillRect(i*bw,H-h,Math.max(bw-1,1),h);
  }

  // Beat markers
  ctx.strokeStyle='rgba(255,255,255,0.1)';
  ctx.lineWidth=1;
  [30,70,150].forEach(x=>{
    ctx.beginPath();ctx.moveTo(x*bw,0);ctx.lineTo(x*bw,H);ctx.stroke();
  });
}

// ═══════════════════════════════════════════
//  HAPTIC MAPPING
// ═══════════════════════════════════════════
// Motor zones by body region
const ZONES={
  chest:   [0,1,2,3],        // top row front - chest
  belly:   [4,5,6,7],        // second row front
  core:    [8,9,10,11],      // mid front
  lower:   [12,13,14,15],    // lower front
  feet:    [16,17,18,19],    // bottom front
  upperBack:[100,101,102,103],
  midBack: [104,105,106,107,108,109,110,111],
  lowerBack:[112,113,114,115,116,117,118,119],
};

let waveStep=0;
let lastHapticTime=0;

async function triggerHapticBand(band,energy){
  const intensity=Math.round(parseInt(document.getElementById('haptic-intensity').value)*energy*1.3);
  const clampedI=Math.min(Math.max(intensity,20),100);
  const mode=document.getElementById('haptic-mode').value;
  const spread=document.getElementById('spread-mode').value;

  let motors=[], duration=120, logClass='', logText='';

  if(band==='kick'){
    // Kick drum: hit chest hard, ripple out
    logClass='kick'; logText='🥁 鼓点';
    if(mode==='immersive'){
      motors=[...ZONES.chest,...ZONES.upperBack];
      duration=200;
    } else if(mode==='bass'){
      motors=[...ZONES.chest,...ZONES.belly,...ZONES.core];
      duration=250;
    } else {
      if(spread==='center') motors=[...ZONES.chest,...ZONES.upperBack];
      else if(spread==='wave') motors=spreadWave();
      else motors=randomZone();
    }
  } else if(band==='bass'){
    logClass='bass'; logText='🎸 Bass';
    if(mode==='bass'){
      motors=[...ZONES.chest,...ZONES.belly,...ZONES.core,...ZONES.midBack];
      duration=180;
    } else {
      motors=[...ZONES.belly,...ZONES.midBack];
      duration=150;
    }
  } else if(band==='mid'){
    logText='🎵 中频';
    if(mode==='immersive'){
      motors=[...ZONES.core,...ZONES.midBack];
      duration=100;
    } else {
      motors=[...ZONES.belly,...ZONES.core];
      duration=80;
    }
  } else if(band==='hi'){
    logText='✨ 高频';
    motors=[...ZONES.chest.slice(0,2),...ZONES.upperBack.slice(0,2)];
    duration=60;
  }

  if(motors.length===0)return;

  // Flash beat map
  flashBeatMap(motors, band);
  document.getElementById('beat-log').textContent=logText+' · 强度'+clampedI;
  document.getElementById('beat-log').className='beat-log '+logClass;

  // Send haptic
  const pkt=buildShake(motors,clampedI,duration);
  await sendHaptic(pkt);
}

// Wave spread: alternating rows
function spreadWave(){
  waveStep=(waveStep+1)%5;
  const rowFront=Object.values(ZONES).filter((_,i)=>i<5);
  const rowBack=Object.values(ZONES).filter((_,i)=>i>=5);
  const allRows=[ZONES.chest,ZONES.belly,ZONES.core,ZONES.lower,ZONES.feet];
  return [...allRows[waveStep],...(waveStep<3?ZONES.upperBack:ZONES.lowerBack)];
}

function randomZone(){
  const keys=Object.keys(ZONES);
  return ZONES[keys[Math.floor(Math.random()*keys.length)]];
}

// ═══════════════════════════════════════════
//  BEAT MAP VISUALIZATION
// ═══════════════════════════════════════════
function buildBeatMap(){
  const container=document.getElementById('beat-map');
  container.innerHTML='';
  for(let row=0;row<5;row++){
    for(let col=0;col<8;col++){
      const mIdx=col<4?row*4+col:100+row*4+(col-4);
      const cell=document.createElement('div');
      cell.className='beat-cell '+(col<4?'front':'back');
      cell.id='bc-'+mIdx;
      cell.textContent=mIdx<100?mIdx:(mIdx-100);
      container.appendChild(cell);
    }
  }
}

const flashTimers=new Map();
function flashBeatMap(motors,band){
  const cls=band==='kick'?'active-low':band==='bass'?'active-mid':'active-hi';
  for(const m of motors){
    const el=document.getElementById('bc-'+m);
    if(!el)continue;
    el.classList.add(cls);
    clearTimeout(flashTimers.get(m));
    flashTimers.set(m,setTimeout(()=>el.classList.remove(cls),150));
  }
}

// ═══════════════════════════════════════════
//  FREQ BARS
// ═══════════════════════════════════════════
function buildFreqBars(){
  const c=document.getElementById('freq-bars');
  c.innerHTML='';
  for(let i=0;i<32;i++){
    const bar=document.createElement('div');
    bar.className='freq-bar '+(i<8?'low':i<18?'mid':'hi');
    bar.id='fb-'+i;
    c.appendChild(bar);
  }
}

function updateFreqBars(energies){
  const keys=['kick','kick','kick','kick','kick','kick','kick','kick',
               'bass','bass','bass','bass','bass','bass','bass','bass','bass','bass',
               'mid','mid','mid','mid','mid','mid',
               'hi','hi','hi','hi','hi','hi','hi','hi'];
  for(let i=0;i<32;i++){
    const bar=document.getElementById('fb-'+i);
    if(!bar)continue;
    const e=energies[keys[i]]||0;
    bar.style.height=Math.round(e*38+2)+'px';
  }
}

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
function setStatus(t,type=''){
  const el=document.getElementById('status');
  el.textContent=t; el.className='status-line '+(type||'');
}
function formatTime(s){
  const m=Math.floor(s/60);
  return m+':'+(Math.floor(s%60)+'').padStart(2,'0');
}
function updateIntensity(v){
  document.getElementById('intensity-val').textContent=v;
  document.getElementById('haptic-intensity').style.setProperty('--val',(v-20)/80*100+'%');
}
function updateSensitivity(v){
  document.getElementById('sensitivity-val').textContent=v;
  document.getElementById('beat-sensitivity').style.setProperty('--val',(v-1)/9*100+'%');
}

// Drag and drop
const uz=document.getElementById('upload-zone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag');});
uz.addEventListener('dragleave',e=>uz.classList.remove('drag'));
uz.addEventListener('drop',e=>{
  e.preventDefault();uz.classList.remove('drag');
  if(e.dataTransfer.files[0])loadAudio(e.dataTransfer.files[0]);
});

// Init
buildBeatMap();
buildFreqBars();
</script>
