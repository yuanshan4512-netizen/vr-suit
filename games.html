<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truegear 适配游戏</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#04060f;--bg2:#080d1a;--bg3:#0d1525;--border:#1a2540;--accent:#00e5ff;--accent2:#7c3aed;--text:#c8d8f0;--dim:#3a4a6a;--font-hd:'Orbitron',monospace;--font-mono:'Share Tech Mono',monospace;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;}
    body::before{content:'';pointer-events:none;position:fixed;inset:0;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);}

    .hero{position:relative;z-index:1;padding:50px 24px 36px;text-align:center;background:linear-gradient(180deg,rgba(0,229,255,.04) 0%,transparent 100%);border-bottom:1px solid var(--border);}
    .back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:1px solid var(--border);color:var(--dim);font-size:11px;letter-spacing:1px;text-decoration:none;margin-bottom:28px;transition:all .2s;}
    .back-btn:hover{border-color:var(--accent);color:var(--accent);}
    .hero-tag{font-family:var(--font-hd);font-size:11px;letter-spacing:4px;color:var(--accent);margin-bottom:14px;opacity:.7;}
    .hero-title{font-family:var(--font-hd);font-size:clamp(22px,5vw,40px);font-weight:900;line-height:1.2;margin-bottom:14px;background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero-sub{color:var(--dim);font-size:13px;letter-spacing:1px;margin-bottom:24px;}
    .hero-count{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:30px;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);font-family:var(--font-hd);font-size:32px;font-weight:900;color:var(--accent);text-shadow:0 0 20px var(--accent);}
    .hero-count span{font-size:12px;color:var(--dim);font-family:var(--font-mono);letter-spacing:2px;}

    .controls{position:sticky;top:0;z-index:10;background:rgba(4,6,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .search-wrap{flex:1;min-width:160px;position:relative;}
    .search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:13px;padding:8px 10px 8px 34px;outline:none;transition:border-color .2s;}
    .search-wrap input:focus{border-color:var(--accent);}
    .search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;}
    .filter-btns{display:flex;gap:4px;flex-wrap:wrap;}
    .fbtn{padding:5px 10px;border-radius:6px;font-size:10px;letter-spacing:1px;border:1px solid var(--border);background:var(--bg2);color:var(--dim);cursor:pointer;transition:all .2s;font-family:var(--font-mono);text-transform:uppercase;}
    .fbtn.active{background:rgba(0,229,255,.1);border-color:var(--accent);color:var(--accent);}
    .result-count{font-size:10px;color:var(--dim);white-space:nowrap;letter-spacing:1px;}

    .grid-wrap{position:relative;z-index:1;padding:16px;}
    .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
    @media(max-width:360px){.games-grid{grid-template-columns:repeat(2,1fr);}}

    .game-card{position:relative;border-radius:10px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .25s;aspect-ratio:460/215;}
    .game-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,229,255,.15);}
    .game-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
    .game-card:hover img{transform:scale(1.06);}
    .game-card .overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(4,6,15,.95) 100%);opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;padding:8px;}
    .game-card:hover .overlay{opacity:1;}
    .game-card .g-name{font-size:11px;color:white;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.8);}
    .game-card .vr-badge{position:absolute;top:5px;right:5px;background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.3);border-radius:4px;padding:2px 5px;font-size:8px;color:var(--accent);letter-spacing:1px;backdrop-filter:blur(4px);}
    .game-card .img-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim);text-align:center;padding:8px;background:var(--bg3);}

    .no-results{text-align:center;padding:60px 20px;color:var(--dim);font-size:14px;}
    .footer{text-align:center;padding:28px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);letter-spacing:1px;position:relative;z-index:1;}
    .footer a{color:var(--accent);text-decoration:none;}
  </style>
</head>
<body>

<div class="hero">
  <a class="back-btn" href="index.html">← 返回控制台</a>
  <div class="hero-tag">TRUEGEAR · 体感服</div>
  <h1 class="hero-title">已适配游戏</h1>
  <p class="hero-sub">穿上体感服，让游戏触感真实可及</p>
  <div class="hero-count"><span id="total-count">83</span><span>款游戏已适配</span></div>
</div>

<div class="controls">
  <div class="search-wrap"><input type="text" id="search-input" placeholder="搜索游戏..." oninput="filterGames()"></div>
  <div class="filter-btns">
    <div class="fbtn active" data-tag="all"      onclick="setTag('all')">全部</div>
    <div class="fbtn"        data-tag="vr"       onclick="setTag('vr')">VR</div>
    <div class="fbtn"        data-tag="action"   onclick="setTag('action')">动作</div>
    <div class="fbtn"        data-tag="shooter"  onclick="setTag('shooter')">射击</div>
    <div class="fbtn"        data-tag="survival" onclick="setTag('survival')">生存</div>
    <div class="fbtn"        data-tag="racing"   onclick="setTag('racing')">赛车</div>
    <div class="fbtn"        data-tag="cn"       onclick="setTag('cn')">国产</div>
  </div>
  <span class="result-count" id="result-count"></span>
</div>

<div class="grid-wrap">
  <div class="games-grid" id="games-grid"></div>
  <div class="no-results" id="no-results" style="display:none">未找到匹配游戏</div>
</div>

<div class="footer">更多游戏持续适配中 · <a href="https://www.truegear.cn" target="_blank">www.truegear.cn</a></div>

function imgUrl(g){
  if(g.img==='_simhub')return'https://static.truegear.cn/simhub/simhub2.png';
  if(g.img==='_mc')return'https://static.truegear.cn/static/English/imgs/iamge/MineCraft.jpg';
  return`https://media.st.dl.eccdnx.com/steam/apps/${g.img}/header.jpg`;
}

let currentTag='all';

function setTag(tag){
  currentTag=tag;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.tag===tag));
  filterGames();
}

function filterGames(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const grid=document.getElementById('games-grid');
  grid.innerHTML='';
  let count=0;
  for(const g of GAMES){
    if(currentTag!=='all'&&!g.tags.includes(currentTag))continue;
    if(q&&!g.name.toLowerCase().includes(q))continue;
    count++;
    const card=document.createElement('div');
    card.className='game-card';
    const isVR=g.tags.includes('vr');
    card.innerHTML=`
      <img src="${imgUrl(g)}" alt="${g.name}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="img-fallback" style="display:none">${g.name}</div>
      ${isVR?'<div class="vr-badge">VR</div>':''}
      <div class="overlay"><div class="g-name">${g.name}</div></div>
    `;
    grid.appendChild(card);
  }
  document.getElementById('result-count').textContent=count+' 款';
  document.getElementById('total-count').textContent=GAMES.length;
  document.getElementById('no-results').style.display=count===0?'block':'none';
}

filterGames();
</script>
